<svg viewBox="0 0 400 300" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="gradPriorAuth" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0d9488;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#14b8a6;stop-opacity:1" />
    </linearGradient>
  </defs>

  <!-- Background -->
  <rect width="400" height="300" fill="#f8f8f6"/>

  <!-- Decorative elements -->
  <circle cx="80" cy="50" r="40" fill="#0d9488" opacity="0.1"/>
  <circle cx="320" cy="250" r="50" fill="#0d9488" opacity="0.08"/>

  <!-- Document icon -->
  <rect x="60" y="80" width="120" height="160" rx="8" fill="none" stroke="#0d9488" stroke-width="2"/>
  <line x1="80" y1="110" x2="160" y2="110" stroke="#0d9488" stroke-width="2"/>
  <line x1="80" y1="135" x2="160" y2="135" stroke="#0d9488" stroke-width="1.5" opacity="0.6"/>
  <line x1="80" y1="155" x2="140" y2="155" stroke="#0d9488" stroke-width="1.5" opacity="0.6"/>
  <line x1="80" y1="175" x2="150" y2="175" stroke="#0d9488" stroke-width="1.5" opacity="0.6"/>

  <!-- Checkmark icon -->
  <circle cx="280" cy="120" r="45" fill="url(#gradPriorAuth)"/>
  <path d="M 260 120 L 273 135 L 305 105" fill="none" stroke="white" stroke-width="3" stroke-linecap="round" stroke-linejoin="round"/>

  <!-- Arrow between -->
  <path d="M 200 150 L 235 150" fill="none" stroke="#0d9488" stroke-width="2" stroke-linecap="round"/>
  <path d="M 230 145 L 235 150 L 230 155" fill="none" stroke="#0d9488" stroke-width="2" stroke-linejoin="round"/>

  <!-- Clock icon for speed -->
  <circle cx="110" cy="260" r="30" fill="none" stroke="#14b8a6" stroke-width="2"/>
  <line x1="110" y1="245" x2="110" y2="260" stroke="#14b8a6" stroke-width="2" stroke-linecap="round"/>
  <line x1="110" y1="260" x2="122" y2="260" stroke="#14b8a6" stroke-width="2" stroke-linecap="round"/>

  <!-- Text -->
  <text x="200" y="285" font-family="Arial, sans-serif" font-size="16" font-weight="bold" text-anchor="middle" fill="#0d9488">Automated Authorization</text>
</svg>