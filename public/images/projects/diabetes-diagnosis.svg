<svg viewBox="0 0 400 300" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="gradDiabetes" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0d9488;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#14b8a6;stop-opacity:1" />
    </linearGradient>
  </defs>

  <!-- Background -->
  <rect width="400" height="300" fill="#f8f8f6"/>

  <!-- Decorative elements -->
  <circle cx="320" cy="60" r="35" fill="#0d9488" opacity="0.1"/>
  <circle cx="60" cy="240" r="45" fill="#0d9488" opacity="0.08"/>

  <!-- Data visualization chart -->
  <rect x="50" y="150" width="140" height="100" rx="6" fill="none" stroke="#0d9488" stroke-width="2"/>

  <!-- Chart bars -->
  <rect x="65" y="215" width="20" height="35" fill="#0d9488" opacity="0.5"/>
  <rect x="92" y="190" width="20" height="60" fill="#0d9488" opacity="0.7"/>
  <rect x="119" y="165" width="20" height="85" fill="url(#gradDiabetes)"/>
  <rect x="146" y="200" width="20" height="50" fill="#0d9488" opacity="0.6"/>

  <!-- Stethoscope icon -->
  <circle cx="280" cy="110" r="8" fill="#0d9488"/>
  <path d="M 280 118 Q 265 140 260 160" fill="none" stroke="#0d9488" stroke-width="3" stroke-linecap="round"/>
  <path d="M 280 118 Q 295 140 300 160" fill="none" stroke="#0d9488" stroke-width="3" stroke-linecap="round"/>
  <circle cx="260" cy="165" r="6" fill="none" stroke="#0d9488" stroke-width="2.5"/>
  <circle cx="300" cy="165" r="6" fill="none" stroke="#0d9488" stroke-width="2.5"/>

  <!-- Assessment indicator -->
  <circle cx="320" cy="250" r="35" fill="none" stroke="#14b8a6" stroke-width="2"/>
  <text x="320" y="260" font-family="Arial, sans-serif" font-size="24" font-weight="bold" text-anchor="middle" fill="#0d9488">A1C</text>

  <!-- Text -->
  <text x="200" y="285" font-family="Arial, sans-serif" font-size="16" font-weight="bold" text-anchor="middle" fill="#0d9488">Clinical Risk Assessment</text>
</svg>